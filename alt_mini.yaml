# alt-mini: smol-deep 253M -- d576 x L30 (SmolLM2-135M shape), max Tria depth chain
optimizer: atom
steps: 21000
lr: 1e-4
weight_decay: 0.01
grad_clip: 1.5
warmup_steps: 500
min_lr_frac: 0.1
seed: 1
log_every: 10
eval_every: 500
eval_batches: 10
device: cuda:0,cuda:1
grad_accum_steps: 1
grad_checkpointing: true         # L=30: recompute < 60 sublayer-hist
amp_dtype: bf16
save_every: 4000
runpoints_path: null
graph: False
save_graph: False

# sequence / batch
seq_len: 1536
batch_size: 34
prefetch_batches: 300

# positional encoding
rope_theta: 10000.0
rope_original_seq_len: 1536
rope_factor: 4.0
rope_beta_fast: 32.0
rope_beta_slow: 1.0
rope_attention_factor: null

# carrier Tria and temporal refeed
tria_carry_enabled: true
use_cuda_tria: true
tria_gamma_max: 0.80             
tria_raw_gamma_init: 0.01
tria_temporal_enabled: true
tria_temporal_auto: false
tria_temporal_window: 192        # 7 refeed/seq
tria_temporal_window_min: 32
tria_target_refeeds_per_sequence: 7
tria_carrier_alpha: 0.05

# data / tokenizer
tokenizer: ./tokenizer32768.json
vocab: 32768
tied_embeddings: true

# pretrain datasets
train_dataset: ./datasets/fw-edu
val_dataset: null
auto_val_split_pct: 0.1

# on-the-fly corpus format
dataset_format: auto
text_field: text
dataset_cache: null

# model shape: 253M, w/d = 576/30 = 19 (SmolLM2/MobileLLM deep-thin band)
model_dim: 576
n_q_heads: 6
head_dim: 96
n_kv_heads: 2
gqa_group_size: 3

# Paraplex FFN
hidden: null
hidden_mult: 4                   # 2304
layers: 30                       # 10 tria-cycles (30 % 3 == 0)
final_norm: true
paraplex_gate_proj: true

# phase / residual / activation knobs
phase_sectors: head
residual_init: beta
depth_attn_readout: per-sublayer
depth_attn_qkv_rms: true
residual_branch_rms_cap: 1.0
activation: pvpowlu
powlu_m: 3.0
phase_grad_floor: 0.05
phase_grad_mode: secant
attn_impl: sdpa

# precision / CUDA fast paths
use_cuda_beta_space: true
use_cuda_phase_sin: true
use_cuda_pvpowlu: true
use_cuda_depth_attn: true
