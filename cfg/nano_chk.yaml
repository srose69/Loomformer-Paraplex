# nano chk
optimizer: atom                     # atom | adamw
steps: 150000
lr: 2e-4
weight_decay: 0.01
grad_clip: 1.55
warmup_steps: 1500
min_lr_frac: 0.1
seed: 1
log_every: 100
eval_every: 500
eval_batches: 10
device: cuda:0                      # cpu | cuda[:N] | cudas | cuda:N,cuda:M
grad_accum_steps: 1
grad_checkpointing: false
graph: false
save_graph: false
amp_dtype: bf16                     # bf16 | fp32 | fp16 | off
save_every: 2500
runpoints_path: null

# sequence / batch
seq_len: 1024                       # must be > 0
batch_size: 24                      # DDP: must be divisible by world_size
prefetch_batches: 256

# positional encoding
rope_theta: 10000.0                 # must be > 0
rope_original_seq_len: 1024         # null | > 0
rope_factor: 4.0                    # must be > 0
rope_beta_fast: 32.0                # must be > 0
rope_beta_slow: 1.0                 # must be > 0
rope_attention_factor: null

# carrier Tria and temporal refeed
tria_carry_enabled: true            # true requires tria_temporal_enabled: true
use_cuda_tria: true
tria_gamma_max: 0.80
tria_raw_gamma_init: 0.25
tria_temporal_enabled: true
tria_temporal_auto: false           # false requires tria_temporal_window
tria_temporal_window: 128           # must be > 0
tria_temporal_window_min: 32
tria_target_refeeds_per_sequence: 7
tria_min_refeeds_per_sequence: 1
tria_carrier_alpha: 0.0375          # must be finite and > 0
tria_carrier_alpha_candidates: [0.0125, 0.025, 0.0375, 0.05, 0.0625, 0.075] # must contain a finite value > 0
tria_temporal_max_condition: 3.0   # must be > 1
tria_temporal_min_effective_rank: 2.70 # must be in [1, 3]
tria_temporal_population_pass_fraction: 0.90 # must be in (0, 1]
tria_temporal_calib_seeds: 1
tria_temporal_calib_batch: 1
tria_temporal_calib_tokens: 512
tria_temporal_calib_device: auto    # auto | cpu | cuda[:N]
tria_temporal_calib_parallel_sweep: 2

# data / tokenizer
tokenizer: tokenizer_256k_1024.json # null | local .json | Hugging Face name/path
vocab: 4096                        # must be > 0
tied_embeddings: false

# pretrain datasets
train_dataset: ./datasets/fss1str_256k
val_dataset: null
auto_val_split_pct: 0.0             # 0 disables; otherwise must be in (0, 100)

# on-the-fly corpus format
dataset_format: arrow               # auto | bin | txt | jsonl | parquet | arrow
text_field: text
dataset_cache: null                 # null | mmap | ram

# model shape
model_dim: 768                      # with head_dim: = q_heads*head_dim; otherwise divisible by q_heads
n_q_heads: 8                        # must be > 0
head_dim: 96                        # must be even; multiple of 4 enables fast CUDA path
n_kv_heads: null                    # null | positive divisor of n_q_heads
gqa_group_size: 4                   # null | positive divisor of n_q_heads

# Paraplex FFN
hidden: null                        # null | positive multiple of n_q_heads
hidden_mult: 4.0
layers: 10                          # must be > 0

# phase / residual / activation knobs
phase_sectors: head                 # head | open
residual_init: beta                 # beta | fanin
activation: pvpowlu                 # gelu | powlu | pvpowlu
powlu_m: 3.0
phase_grad_floor: 0.05
phase_grad_mode: secant             # floor | secant
attn_impl: sdpa                     # sdpa | manual

# precision / CUDA fast paths
use_cuda_beta_space: true
use_cuda_phase_sin: true
use_cuda_pvpowlu: true
use_cuda_depth_attn: true
