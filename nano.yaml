optimizer: atom                 # atom | adamw
steps: 150000                  
lr: 2e-4                      
weight_decay: 0.01
grad_clip: 1.55                 # lower than tiny; wider/deeper + Tria gates need less violence
warmup_steps: 1500              # 5% warmup; 20 was for smoke, not real scaling
min_lr_frac: 0.1
seed: 1
log_every: 100
eval_every: 500    
eval_batches: 10                 # less noisy than 2, still cheap enough
device: cuda:0
grad_accum_steps: 1             # doubled vs smol's 2 -- compensates batch_size halving, same tok/step
grad_checkpointing: False       # ON for nano -- 116M activations at B16 would overshoot 48GB otherwise
graph: False
save_graph: False
amp_dtype: bf16
save_every: 2500
runpoints_path: null            # null -> will auto-create

# sequence / batch
seq_len: 1024                   # unchanged from smol
batch_size: 30                 
prefetch_batches: 256           # 512 is fine too; 256 is less RAM pressure with T1024

# positional encoding
rope_theta: 10000.0             # YaRN/RoPE base frequency theta; 10000 is the standard RoPE default
rope_original_seq_len: 1024      # context length the YaRN frequency grid is anchored to
rope_factor: 4.0                # long-context scale; 1024*4 => rotary grid prepared for ~4096 positions
rope_beta_fast: 32.0            # YaRN high-frequency correction bound; canonical default
rope_beta_slow: 1.0             # YaRN low-frequency correction bound; canonical default
rope_attention_factor: null     # null => YaRN default mscale = 0.1*log(factor)+1

# carrier Tria and temporal refeed
tria_carry_enabled: true
use_cuda_tria: true
tria_gamma_max: 0.80
tria_raw_gamma_init: 0.25
tria_temporal_enabled: true
tria_temporal_auto: false
tria_temporal_window: 128
tria_temporal_window_min: 32
tria_target_refeeds_per_sequence: 7
tria_min_refeeds_per_sequence: 1     # Rejects calibration results that effectively disable refeed.
tria_carrier_alpha: 0.0375
tria_carrier_alpha_candidates: [0.0125, 0.025, 0.0375, 0.05, 0.0625, 0.075]
tria_temporal_max_condition: 3.0
tria_temporal_min_effective_rank: 2.70
tria_temporal_population_pass_fraction: 0.90
tria_temporal_calib_seeds: 1
tria_temporal_calib_batch: 1
tria_temporal_calib_tokens: 512
tria_temporal_calib_device: auto     # Uses the training CUDA device; falls back to CPU if unavailable.
tria_temporal_calib_parallel_sweep: 2  # Hard cap on concurrent (alpha, seed) models; raise cautiously.


# data / tokenizer
tokenizer: ./tokenizer8192.json     # null => byte tokenizer; .json => trained local BPE; otherwise HF tokenizer name/path
vocab: 8192                     # overwritten by tokenizer when tokenizer is set
tied_embeddings: false

# pretrain datasets
train_dataset: ./datasets/fss1str
val_dataset: null               # auto-filled as ./datasets/fss1str/val/val_split.arrow
auto_val_split_pct: 1.0         # percent of the corpus to carve into val on first run; set 0.0 to disable

# on-the-fly corpus format
dataset_format: arrow           # auto | bin | txt | jsonl | parquet | arrow
text_field: text                # format.json says the Arrow column is "text"
dataset_cache: null             # mmap | ram; only matters for prepared .bin TokenStream, not OTF Arrow

# model width
# model_dim is the residual width (aka d_model). With head_dim set, d_model = n_q_heads * head_dim.
# 768 = 8 * 96 -- head_dim bumped 80->96 (see training-block comment: mainstream 64/128 anchors,
# and richer per-head IMAG_IN feeding the Paraplex FFN's phase input), heads kept at 8 like smol.
model_dim: 768

# attention shape
n_q_heads: 8
head_dim: 96                    # d_model = 8 * 96 = 768 (up from smol/tiny's 80 -- see rationale above)

# GQA (grouped-query attention): n_q_heads query heads share fewer key/value heads.
# Set ONE of n_kv_heads or gqa_group_size (the other is derived from it).
#   n_kv_heads     -- how many KV heads to have, directly.
#   gqa_group_size -- how many query heads share EACH kv head (here: 4 q-heads per
#                     kv-head => n_kv_heads = n_q_heads / gqa_group_size = 8 / 4 = 2).
# Bumped from smol's group=2 to group=4 -- Llama-3-8B/Mistral-7B/Qwen2 all run group=4..8 with no
# measurable quality loss vs full MHA (GQA paper, arXiv:2305.13245). Still keeps n_kv_heads=2 (not 1),
# so the header comment's Kctx/C-diversity concern for the Paraplex FFN still holds -- this isn't MQA.
n_kv_heads: null
gqa_group_size: 4

# Paraplex FFN
hidden: null                    # null => round_up(model_dim * hidden_mult, n_q_heads)
hidden_mult: 4.0                # hidden = 3072 for model_dim=768
layers: 10                      # deeper than smol's 8 at a similar per-layer width; see rationale above

# phase / residual / activation knobs
phase_sectors: head             # head | open
residual_init: beta             # beta | fanin
activation: pvpowlu             # gelu | powlu | pvpowlu
powlu_m: 3.0
phase_grad_floor: 0.05
phase_grad_mode: secant
attn_impl: sdpa                 # sdpa | manual

# precision / CUDA fast paths
use_cuda_beta_space: true
use_cuda_phase_sin: true
use_cuda_pvpowlu: true
use_cuda_depth_attn: true
