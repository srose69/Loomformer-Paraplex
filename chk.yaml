# training
optimizer: atom                 # atom | adamw
steps: 4500                      # tiny temporal-Tria check: short run, dense logs, cuda Tria
                                 # layer kernels + temporal scan on
lr: 5e-4
weight_decay: 0.01
grad_clip: 1.2
warmup_steps: 20
min_lr_frac: 0.1
seed: 1
log_every: 1                     # debug: print every step to measure temporal Tria speed
eval_every: 25                   # keep eval off the per-step speed measurement
eval_batches: 1
device: cuda:0
grad_accum_steps: 1
grad_checkpointing: False
graph: False
save_graph: False
amp_dtype: bf16                  # cuda:0 here is Pascal (GTX 1080, no bf16 tensor cores) --
                                  # bf16 autocast silently falls back to fp32 anyway on this
                                  # GPU (see amp_dtype note above), so being explicit avoids
                                  # any autocast overhead for no benefit.

# sequence / batch
seq_len: 512                     # short -- tiny model, fast steps, enough room for temporal
                                  # renewal windows inside each packed segment
batch_size: 1 
prefetch_batches: 512

# positional encoding
rope_theta: 10000.0             # YaRN/RoPE base frequency theta; 10000 is the standard RoPE default
rope_original_seq_len: 512      # context length the YaRN frequency grid is anchored to
rope_factor: 4.0                # long-context scale; 128*4 => rotary grid prepared for ~512 positions
rope_beta_fast: 32.0            # YaRN high-frequency correction bound; canonical default
rope_beta_slow: 1.0             # YaRN low-frequency correction bound; canonical default
rope_attention_factor: null     # null => YaRN default mscale = 0.1*log(factor)+1

# tria small temporal carry
tria_carry_enabled: true
use_cuda_tria: true             # depth-wise Tria CUDA kernels; temporal scan uses CUDA when available
tria_temporal_enabled: True
tria_temporal_window: 128
tria_temporal_auto: false        # choose carrier alpha and W from startup stability calibration
tria_temporal_window_min: 32
tria_temporal_window_max: 128  # hard W cap; null uses the refeed target
tria_target_refeeds_per_sequence: 3  # requested refeed boundaries per train sequence
tria_temporal_calib_tokens: 128  # startup horizon used to test each alpha
tria_temporal_calib_device: auto  # current CUDA device when available, otherwise CPU
tria_carrier_alpha_candidates: [0.025, 0.0375, 0.05]  # fixed write-strength candidates
tria_temporal_max_condition: 3.0  # largest accepted singular-value ratio
tria_temporal_min_effective_rank: 2.70  # smallest accepted entropy rank (max 3)
tria_temporal_population_pass_fraction: 0.90  # required stable fraction of BxH streams

# data / tokenizer
tokenizer: ./tokenizer_256k_1024.json  # trained ONLY on the 256k snippet, vocab=1024 --
                                        # tiny model should actually be able to discriminate
                                        # these tokens (unlike the full-corpus 4096-vocab
                                        # tokenizer, which the tiny model was likely too weak
                                        # to use well)
vocab: 4096                     # overwritten by tokenizer when tokenizer is set

# pretrain datasets
train_dataset: ./datasets/fss1str_256k   # fixed ~256k-token snippet (tmp/build_snippet_dataset.py) --
                                          # looping over this small, finite slice for ~4 epochs lets the
                                          # tiny model actually get good at predicting THIS text much
                                          # sooner than one pass over the full 5.3B-token corpus spread thin
val_dataset: ./datasets/fss1str_256k/val/val_split.arrow  # separate slice, not sampled from train
auto_val_split_pct: 0.0          # disabled -- val_dataset is explicit and pre-built here, no need
                                  # (and no destructive splitting of this tiny fixed snippet)

# on-the-fly corpus format
dataset_format: arrow           # auto | bin | txt | jsonl | parquet | arrow
text_field: text                # format.json says the Arrow column is "text"
dataset_cache:                  # mmap | ram; only matters for prepared .bin TokenStream, not OTF Arrow

# model width
# model_dim is the residual width (aka d_model). With head_dim set, d_model = n_q_heads * head_dim.
# width/depth (model_dim/layers) ratio widened to ~85 (256/3), the middle of the
# typical 60-130 band real transformers use (GPT-2 small 768/12=64, BERT-base
# 768/12=64, GPT-3 175B 12288/96=128) -- was 128/3=~43, notably narrower than
# that band even after the earlier GQA fix.
model_dim: 256

# attention shape
n_q_heads: 8
head_dim: 32                    # d_model = 8 * 32 = 256

# GQA (grouped-query attention): n_q_heads query heads share fewer key/value heads.
# Set ONE of n_kv_heads or gqa_group_size (the other is derived from it).
#   n_kv_heads     -- how many KV heads to have, directly.
#   gqa_group_size -- how many query heads share EACH kv head (here: 2 q-heads per
#                     kv-head => n_kv_heads = n_q_heads / gqa_group_size = 8 / 2 = 4).
n_kv_heads: null
gqa_group_size: 2

# Paraplex FFN
hidden: null                    # null => round_up(model_dim * hidden_mult, n_q_heads)
hidden_mult: 4.0                # hidden = 1024 for model_dim=256
layers: 9                       # tried 5 (width=128 fixed): eval_loss got WORSE (5.99 vs 5.88
                                 # full_eval) and tria firing collapsed back to ~10-200/step
                                 # (was 5900-9400 at layers=3) -- confirms Levine et al. 2020:
                                 # at this narrow width self-attention is depth-inefficient,
                                 # reverted to 3.

# phase / residual / activation knobs
phase_sectors: head             # head | open
residual_init: beta             # beta | fanin
activation: pvpowlu             # gelu | powlu | pvpowlu
powlu_m: 3.0
phase_grad_floor: 0.05
phase_grad_mode: secant 
attn_impl: sdpa                 # sdpa | manual

# precision / CUDA fast paths
use_cuda_beta_space: true
use_cuda_phase_sin: true
