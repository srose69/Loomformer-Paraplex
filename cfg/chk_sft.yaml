device: cuda:0                      # cpu | cuda[:N] | cudas | cuda:N,cuda:M
optimizer: atom                     # atom | adamw
steps: 4
lr: 5e-5
weight_decay: 0.01
grad_clip: 1.0
warmup_steps: 1
min_lr_frac: 0.1
seed: 1
log_every: 1
eval_every: 2
eval_batches: 1
grad_accum_steps: 1
grad_checkpointing: false
graph: false
save_graph: false
amp_dtype: bf16                     # bf16 | fp32 | fp16 | off
attn_sdpa_compute_dtype: auto       # auto | model | fp32 | fp16 | bf16
save_every: 0

# sequence / batch
seq_len: 512                        # must be > 0
batch_size: 1                       # DDP: must be divisible by world_size
prefetch_batches: 16

rope_theta: 10000.0                 # must be > 0
rope_original_seq_len: 512          # null | > 0
rope_factor: 4.0                    # must be > 0
rope_beta_fast: 32.0                # must be > 0
rope_beta_slow: 1.0                 # must be > 0
rope_attention_factor: null

tria_carry_enabled: true            # true requires tria_temporal_enabled: true
use_cuda_tria: true
tria_temporal_enabled: true
tria_temporal_auto: false           # false requires tria_temporal_window
tria_temporal_window: 128           # must be > 0
tria_temporal_window_min: 32
tria_temporal_window_max: 128
tria_target_refeeds_per_sequence: 3
tria_temporal_calib_tokens: 128
tria_temporal_calib_device: auto    # auto | cpu | cuda[:N]
tria_carrier_alpha: 0.05            # must be finite and > 0
tria_carrier_alpha_candidates: [0.025, 0.0375, 0.05] # must contain a finite value > 0
tria_temporal_max_condition: 3.0   # must be > 1
tria_temporal_min_effective_rank: 2.70 # must be in [1, 3]
tria_temporal_population_pass_fraction: 0.90 # must be in (0, 1]

tokenizer: ./tokenizer_256k_1024.json # null | local .json | Hugging Face name/path
vocab: 4096                        # must be > 0
tied_embeddings: true

train_dataset: ./datasets/sft/train.jsonl
val_dataset: ./datasets/sft/val.jsonl
dataset_format: jsonl               # auto | bin | txt | jsonl | parquet | arrow
text_field: text
dataset_cache: null                 # null | mmap | ram

model_dim: 256                      # with head_dim: = q_heads*head_dim; otherwise divisible by q_heads
n_q_heads: 8                        # must be > 0
head_dim: 32                        # must be even; multiple of 4 enables fast CUDA path
n_kv_heads: null                    # null | positive divisor of n_q_heads
gqa_group_size: 2                   # null | positive divisor of n_q_heads
hidden: null                        # null | positive multiple of n_q_heads
hidden_mult: 4.0
layers: 9                           # must be > 0

phase_sectors: head                 # head | open
residual_init: beta                 # beta | fanin
activation: pvpowlu                 # gelu | powlu | pvpowlu
powlu_m: 3.0
phase_grad_floor: 0.05
phase_grad_mode: secant             # floor | secant
attn_impl: sdpa                     # sdpa | manual

use_cuda_beta_space: true
use_cuda_phase_sin: true
use_cuda_pvpowlu: true
use_cuda_depth_attn: true
